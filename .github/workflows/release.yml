name: Release

# Publishes a signed, self-updating portable build. Push a version tag to fire it:
#
#   git tag v0.5.0
#   git push origin v0.5.0
#
# The tag name (minus the leading "v") must match the version in tauri.conf.json.
#
# Uses the existing repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           - the minisign private key that pairs with
#                                         the pubkey in tauri.conf.json / updater.rs
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  - its password (empty secret if none)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build portable binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Sign portable binary
        run: npx --yes @tauri-apps/cli signer sign "src-tauri/target/release/automate.exe"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build update manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $signature = (Get-Content "src-tauri/target/release/automate.exe.sig" -Raw).Trim()
          $manifest = [ordered]@{
            version   = $version
            notes     = "Update to v$version. See the in-app changelog for what's new."
            pub_date  = (Get-Date).ToUniversalTime().ToString("o")
            url       = "https://github.com/yourpov/Sys-Assistant/releases/download/${{ github.ref_name }}/automate.exe"
            signature = $signature
          }
          $manifest | ConvertTo-Json -Depth 3 | Out-File -FilePath "update.json" -Encoding utf8

      # draft:false and prerelease:false are required so that the
      # "releases/latest/download/update.json" URL resolves to this release.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Private Assistant ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: 'See the in-app changelog for what changed in this version.'
          files: |
            src-tauri/target/release/automate.exe
            update.json
